{% extends 'billing/base.html' %}
{% block title %}Cargos{% endblock %}
{% block content %}
<h2>Cargos</h2>
<a href="{% url 'rrhh:cargo_create' %}" class="btn btn-primary mb-3">+ Nuevo Cargo </a>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr>
      <th>name </th>
      <th>Description</th>
      <th>is_active</th>
    </tr>
  </thead>
  <tbody>
    {% for i in Cargo %}
    <tr>
      <td>{{ i.name }}</td>
      <td>{{ i.description }}</td>
      <td>{{ i.is_active }}</td>
      <td>
        <a href="{% url 'rrhh:cargo_update' i.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'rrhh:cargo_delete' i.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="5" class="text-center">No records.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
