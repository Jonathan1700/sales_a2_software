{% extends 'billing/base.html' %}
{% block title %}Departamento{% endblock %}
{% block content %}
<h2>Departamento</h2>
<a href="{% url 'billing:departamento_create' %}" class="btn btn-primary mb-3">+ Nuevo Departamento</a>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>Name</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for d in departamentos %}
    <tr>
      <td>{{ d.name }}</td>
      <td>{{ d.is_active }}</td>
      <td>
        <a href="{% url 'billing:departamento_update' d.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'billing:departamento_delete' d.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3" class="text-center">No records.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
