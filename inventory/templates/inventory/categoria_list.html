{% extends 'billing/base.html' %}
{% block title %}Categorias{% endblock %}
{% block content %}
<h2>Categorias</h2>
<a href="{% url 'inventory:categoria_create' %}" class="btn btn-primary mb-3">+ Nueva Categoria </a>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr>
      <th>name </th>
      <th>Description</th>
      <th>is_active</th>
    </tr>
  </thead>
  <tbody>
    {% for i in categoria %}
    <tr>
      <td>{{ i.name }}</td>
      <td>{{ i.description }}</td>
      <td>{{ i.is_active }}</td>
      <td>
        <a href="{% url 'inventory:categoria_update' i.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'inventory:categoria_delete' i.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="5" class="text-center">No records.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
